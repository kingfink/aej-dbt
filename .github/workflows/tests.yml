name: Tests

"on":
  pull_request:
  push:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: "3.13"
      - run: uv sync --locked
      - run: uv run python -m unittest discover -s tests
