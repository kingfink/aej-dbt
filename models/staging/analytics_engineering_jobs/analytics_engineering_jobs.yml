version: 2

sources: 
  - name: analytics_engineering_jobs
    schema: dlt_content
    loader: dlt
    config:
      loaded_at_field: timestamp_millis(cast(cast(_dlt_load_id as float64) * 1000 as int64))
      freshness:
        warn_after: {count: 24, period: hour}
        error_after: {count: 48, period: hour}

    tables:
      - name: jobs
      - name: organizations
