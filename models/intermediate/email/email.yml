version: 2

models:
  - name: int_email_message_events
    description: Email message event spine across SendGrid and Resend.
    columns:
      - name: email_event_id
        tests:
          - not_null
          - unique
      - name: email_id
        description: Message dimension key generated from source and source_email_id.
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - resend
                  - sendgrid
      - name: source_email_id
        tests:
          - not_null
      - name: event_type
        description: Normalized event type such as sent, delivered, opened, or clicked.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - bounced
                  - clicked
                  - delivered
                  - delivery_delayed
                  - opened
                  - resubscribed
                  - sent
                  - suppressed
      - name: email_address
        tests:
          - not_null
      - name: event_ts
        tests:
          - not_null
      - name: privacy_or_bot_reason
        description: Classification assigned to privacy-proxied or automated open and click activity.
        tests:
          - accepted_values:
              arguments:
                values:
                  - bot_or_security_scanner
                  - privacy_or_image_proxy
  - name: int_email_messages
    description: One row per provider email message across SendGrid and Resend.
    columns:
      - name: email_id
        tests:
          - not_null
          - unique
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - resend
                  - sendgrid
      - name: source_email_id
        tests:
          - not_null

  - name: int_email_subscription_events
    description: Subscriber lifecycle events derived from contact state and resubscriptions. A backfilled unsubscribe timestamp represents when the state was first observed, not the precise unsubscribe time.
    columns:
      - name: source
        description: Provider that produced the subscription event.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - resend
                  - sendgrid
      - name: resend_contact_id
        description: Resend contact identifier, populated for Resend events.
      - name: email_address
        tests:
          - not_null
      - name: subscriber_event_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - subscribed
                  - unsubscribed
      - name: event_ts
        tests:
          - not_null

  - name: int_email_subscribers
    description: |
      One row per email address with a subscription lifecycle event. The current `is_subscribed` value reflects Resend contact state; SendGrid events contribute historical context but do not establish current subscription status.
    columns:
      - name: subscriber_id
        tests:
          - not_null
          - unique
      - name: email_address
        tests:
          - not_null
          - unique
      - name: is_subscribed
        tests:
          - not_null
