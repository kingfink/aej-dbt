version: 2

models:
  - name: int_email_message_events
    description: Email message event spine across SendGrid and Resend.
    columns:
      - name: email_event_id
        tests:
          - not_null
          - unique
      - name: email_id
        description: Message dimension key generated from source and source_email_id.
        tests:
          - not_null
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - resend
                  - sendgrid
      - name: source_email_id
        tests:
          - not_null
      - name: event_type
        description: Normalized event type such as sent, delivered, opened, or clicked.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - bounced
                  - clicked
                  - delivered
                  - delivery_delayed
                  - opened
                  - resubscribed
                  - sent
                  - suppressed
      - name: email_address
        tests:
          - not_null
          - is_normalized_email_address
      - name: event_ts
        tests:
          - not_null
      - name: privacy_or_bot_reason
        description: Classification assigned to privacy-proxied or automated open and click activity.
        tests:
          - accepted_values:
              arguments:
                values:
                  - bot_or_security_scanner
                  - privacy_or_image_proxy
  - name: int_email_messages
    description: One row per provider email message across SendGrid and Resend.
    columns:
      - name: email_id
        tests:
          - not_null
          - unique
      - name: source
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - resend
                  - sendgrid
      - name: source_email_id
        tests:
          - not_null

  - name: int_email_subscription_events
    description: Subscriber lifecycle events derived from contact state and resubscriptions. A backfilled unsubscribe timestamp represents when the state was first observed, not the precise unsubscribe time.
    columns:
      - name: subscriber_id
        description: Stable subscriber key generated from the normalized email address.
        tests:
          - not_null
      - name: source
        description: Provider that produced the subscription event.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - resend
                  - sendgrid
      - name: resend_contact_id
        description: Resend contact identifier, populated for Resend events.
      - name: email_address
        tests:
          - not_null
          - is_normalized_email_address
      - name: subscriber_event_type
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - subscribed
                  - unsubscribed
      - name: event_ts
        tests:
          - not_null

  - name: dates
    description: Ephemeral UTC date sequence spanning the known email subscription lifecycle through the current date.
    columns:
      - name: date_day
        tests:
          - not_null
          - unique

  - name: int_email_subscribers
    description: |
      One row per email address with a subscription lifecycle event. The current `is_subscribed` value reflects Resend contact state; SendGrid events contribute historical context but do not establish current subscription status.
    columns:
      - name: subscriber_id
        tests:
          - not_null
          - unique
      - name: email_address
        tests:
          - not_null
          - unique
          - is_normalized_email_address
      - name: is_subscribed
        tests:
          - not_null

unit_tests:
  - name: int_email_subscribers_handles_provider_lifecycle
    description: SendGrid history does not establish current status, while the latest Resend lifecycle event does.
    model: int_email_subscribers
    given:
      - input: ref("int_email_subscription_events")
        rows:
          - {subscriber_id: sendgrid_only, source: sendgrid, resend_contact_id: null, email_address: sendgrid@example.com, subscriber_event_type: subscribed, event_ts: "2026-01-01 00:00:00+00"}
          - {subscriber_id: active_resend, source: resend, resend_contact_id: contact_active, email_address: active@example.com, subscriber_event_type: subscribed, event_ts: "2026-01-02 00:00:00+00"}
          - {subscriber_id: unsubscribed, source: resend, resend_contact_id: contact_unsubscribed, email_address: unsubscribed@example.com, subscriber_event_type: subscribed, event_ts: "2026-01-03 00:00:00+00"}
          - {subscriber_id: unsubscribed, source: resend, resend_contact_id: contact_unsubscribed, email_address: unsubscribed@example.com, subscriber_event_type: unsubscribed, event_ts: "2026-01-04 00:00:00+00"}
          - {subscriber_id: resubscribed, source: resend, resend_contact_id: contact_resubscribed, email_address: resubscribed@example.com, subscriber_event_type: subscribed, event_ts: "2026-01-05 00:00:00+00"}
          - {subscriber_id: resubscribed, source: resend, resend_contact_id: contact_resubscribed, email_address: resubscribed@example.com, subscriber_event_type: unsubscribed, event_ts: "2026-01-06 00:00:00+00"}
          - {subscriber_id: resubscribed, source: resend, resend_contact_id: contact_resubscribed, email_address: resubscribed@example.com, subscriber_event_type: subscribed, event_ts: "2026-01-07 00:00:00+00"}
    expect:
      rows:
        - {subscriber_id: sendgrid_only, email_address: sendgrid@example.com, resend_contact_id: null, is_subscribed: false, min_subscribed_ts: "2026-01-01 00:00:00+00", max_subscribed_ts: "2026-01-01 00:00:00+00", min_unsubscribed_ts: null, max_unsubscribed_ts: null}
        - {subscriber_id: active_resend, email_address: active@example.com, resend_contact_id: contact_active, is_subscribed: true, min_subscribed_ts: "2026-01-02 00:00:00+00", max_subscribed_ts: "2026-01-02 00:00:00+00", min_unsubscribed_ts: null, max_unsubscribed_ts: null}
        - {subscriber_id: unsubscribed, email_address: unsubscribed@example.com, resend_contact_id: contact_unsubscribed, is_subscribed: false, min_subscribed_ts: "2026-01-03 00:00:00+00", max_subscribed_ts: "2026-01-03 00:00:00+00", min_unsubscribed_ts: "2026-01-04 00:00:00+00", max_unsubscribed_ts: "2026-01-04 00:00:00+00"}
        - {subscriber_id: resubscribed, email_address: resubscribed@example.com, resend_contact_id: contact_resubscribed, is_subscribed: true, min_subscribed_ts: "2026-01-05 00:00:00+00", max_subscribed_ts: "2026-01-07 00:00:00+00", min_unsubscribed_ts: "2026-01-06 00:00:00+00", max_unsubscribed_ts: "2026-01-06 00:00:00+00"}
